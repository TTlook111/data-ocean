spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:dataocean;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
  flyway:
    enabled: false

dataocean:
  datasource:
    encrypt-key: 12345678901234567890123456789012
    health-check:
      enabled: false
  query:
    cleanup:
      enabled: false
