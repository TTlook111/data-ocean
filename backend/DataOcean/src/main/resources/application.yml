server:
  port: 8080

spring:
  application:
    name: DataOcean
  profiles:
    active: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:dataocean}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:dataocean-local-dev-secret-key-change-me-at-least-256-bits}
  expiration: ${JWT_EXPIRATION:86400}

security:
  login:
    max-attempts: ${LOGIN_MAX_ATTEMPTS:5}
    lock-duration: ${LOGIN_LOCK_DURATION:1800}

dataocean:
  metadata:
    auto-sync:
      enabled: ${METADATA_AUTO_SYNC_ENABLED:false}
      cron: ${METADATA_AUTO_SYNC_CRON:0 0 2 * * ?}
  audit:
    slow-query-threshold-ms: ${AUDIT_SLOW_THRESHOLD_MS:5000}
    retention-days: ${AUDIT_RETENTION_DAYS:180}

logging:
  level:
    com.dataocean: INFO
